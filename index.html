<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080b10;
  --surface:  #0e1520;
  --border:   #1c2a3a;
  --accent:   #00e5a0;
  --accent2:  #ff4f6a;
  --text:     #e8f0fe;
  --muted:    #4a6080;
  --done:     #00e5a0;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'DM Mono', monospace;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 40px;
  overflow-x: hidden;
}

/* ── Noise grain overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: .5;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: 3px;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(0,229,160,.35);
}

.mode-pill {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 2px;
  padding: 5px 12px;
  border-radius: 99px;
  border: 1px solid var(--accent);
  color: var(--accent);
  background: rgba(0,229,160,.07);
  cursor: pointer;
  transition: all .2s;
  text-transform: uppercase;
}
.mode-pill:hover { background: rgba(0,229,160,.18); }
.mode-pill.period {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(255,79,106,.07);
}

/* ── Main layout ── */
main {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ── Player card ── */
.player-card {
  margin-top: 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

.player-card::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(0,229,160,.08) 0%, transparent 70%);
  pointer-events: none;
}

.player-inner {
  padding: 32px 24px 24px;
  text-align: center;
}

.exercise-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}

#exercise {
  font-family: var(--font-display);
  font-size: 3.2rem;
  letter-spacing: 2px;
  line-height: 1;
  color: var(--text);
  min-height: 3.5rem;
  transition: all .3s ease;
}

/* Ring timer */
.ring-wrap {
  display: flex;
  justify-content: center;
  margin: 28px 0 24px;
}

.ring-wrap svg {
  transform: rotate(-90deg);
}

.ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.ring-fg {
  fill: none;
  stroke: var(--accent);
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset .9s linear, stroke .3s;
}

.ring-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-family: var(--font-display);
  font-size: 2.4rem;
  letter-spacing: 2px;
  color: var(--accent);
}

.ring-container {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* Buttons */
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 24px 24px;
}

.btn {
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .18s;
  font-weight: 500;
}

.btn-primary {
  background: var(--accent);
  color: #080b10;
  grid-column: 1 / -1;
}
.btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ── Section title ── */
.section-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin: 32px 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title span { color: var(--accent); font-size: .9rem; }

/* ── Calendar ── */
.cal-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
}

.day-labels {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 6px;
}
.day-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: var(--muted);
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  aspect-ratio: 1;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  text-align: center;
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .18s;
  position: relative;
}
.day:hover { border-color: var(--accent); color: var(--text); }
.day.done {
  background: rgba(0,229,160,.12);
  border-color: var(--accent);
  color: var(--accent);
}
.day.done::after {
  content: '✓';
  position: absolute;
  top: 2px; right: 4px;
  font-size: .5rem;
  color: var(--accent);
}

/* ── Streak banner ── */
.streak-banner {
  background: linear-gradient(135deg, rgba(0,229,160,.08), rgba(0,229,160,.02));
  border: 1px solid rgba(0,229,160,.2);
  border-radius: 14px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.streak-num {
  font-family: var(--font-display);
  font-size: 3rem;
  color: var(--accent);
  line-height: 1;
}
.streak-info small {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}
.streak-info p {
  font-size: .85rem;
  color: var(--text);
  margin-top: 2px;
}

/* ── Progress ── */
.progress-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
}

.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}

input[type=number] {
  flex: 1;
  padding: 11px 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: .85rem;
  outline: none;
  transition: border .18s;
}
input[type=number]:focus { border-color: var(--accent); }
input[type=number]::placeholder { color: var(--muted); }

.btn-save {
  padding: 11px 20px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #080b10;
  font-family: var(--font-mono);
  font-size: .75rem;
  letter-spacing: 1px;
  cursor: pointer;
  white-space: nowrap;
  transition: filter .18s;
}
.btn-save:hover { filter: brightness(1.12); }

canvas#chart {
  width: 100% !important;
  height: 120px !important;
  display: block;
  border-radius: 8px;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.player-card, .cal-wrap, .streak-banner, .progress-card {
  animation: fadeUp .5s ease both;
}
.cal-wrap   { animation-delay: .1s; }
.streak-banner { animation-delay: .15s; }
.progress-card { animation-delay: .2s; }

/* Rest exercise accent */
#exercise.is-rest { color: var(--muted); }

/* ── Phase badge ── */
.phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 99px;
  margin-bottom: 10px;
  transition: all .3s;
}
.phase-warmup   { background: rgba(255,180,0,.1);   border: 1px solid rgba(255,180,0,.3);  color: #ffb400; }
.phase-workout  { background: rgba(0,229,160,.1);   border: 1px solid rgba(0,229,160,.3);  color: var(--accent); }
.phase-cooldown { background: rgba(120,160,255,.1); border: 1px solid rgba(120,160,255,.3); color: #78a0ff; }

/* ── Phase progress dots ── */
.phase-track {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}
.phase-dot {
  width: 28px; height: 4px;
  border-radius: 2px;
  background: var(--border);
  transition: background .4s;
}
.phase-dot.active  { background: var(--accent); }
.phase-dot.done    { background: rgba(0,229,160,.35); }
.phase-dot.warmup-dot.active  { background: #ffb400; }
.phase-dot.warmup-dot.done    { background: rgba(255,180,0,.35); }
.phase-dot.cooldown-dot.active { background: #78a0ff; }
.phase-dot.cooldown-dot.done   { background: rgba(120,160,255,.35); }

/* ── Exercise hint ── */
.exercise-hint {
  font-family: var(--font-body);
  font-size: 0.78rem;
  color: var(--muted);
  min-height: 1.1em;
  margin-top: 8px;
  transition: opacity .3s;
  font-weight: 300;
}

/* ring colour transitions */
.ring-fg.warmup   { stroke: #ffb400 !important; }
.ring-fg.cooldown { stroke: #78a0ff !important; }

/* ── Stretch reference cards ── */
.stretch-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.stretch-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.stretch-tab {
  flex: 1;
  padding: 12px 8px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
  color: var(--muted);
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all .18s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.stretch-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.stretch-tab:hover:not(.active) { color: var(--text); }

.stretch-list { padding: 16px; }
.stretch-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.stretch-item:last-child { border-bottom: none; }
.stretch-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.stretch-icon.wu { background: rgba(255,180,0,.1); }
.stretch-icon.cd { background: rgba(120,160,255,.1); }
.stretch-info { flex: 1; }
.stretch-name {
  font-family: var(--font-display);
  font-size: 1rem;
  letter-spacing: 1px;
  color: var(--text);
  margin-bottom: 2px;
}
.stretch-desc {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.4;
}
.stretch-dur {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}
</style>
</head>

<body>

<header>
  <div class="logo">FORGED</div>
  <button class="mode-pill" id="modeBtn" onclick="toggleMode()">Normal Mode</button>
</header>

<main>

  <!-- Player -->
  <div class="player-card">
    <div class="player-inner">
      <!-- Phase dots -->
      <div class="phase-track">
        <div class="phase-dot warmup-dot"   id="dot0"></div>
        <div class="phase-dot"              id="dot1"></div>
        <div class="phase-dot cooldown-dot" id="dot2"></div>
      </div>

      <div id="phaseBadge" class="phase-badge phase-workout">● Workout</div>
      <div class="exercise-label">Current Exercise</div>
      <div id="exercise">Ready</div>
      <div class="exercise-hint" id="exerciseHint"></div>

      <div class="ring-wrap">
        <div class="ring-container">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52"
              stroke-dasharray="326.7"
              stroke-dashoffset="0"/>
          </svg>
          <div class="ring-center" id="timer">00</div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="startWorkout()">START WORKOUT</button>
      <button class="btn btn-secondary" onclick="pauseWorkout()">PAUSE</button>
      <button class="btn btn-secondary" onclick="resetWorkout()">RESET</button>
    </div>
  </div>

  <!-- Calendar -->
  <div class="section-title">4-Week Plan <span>28 DAYS</span></div>
  <div class="cal-wrap">
    <div class="day-labels">
      <div class="day-label">M</div><div class="day-label">T</div>
      <div class="day-label">W</div><div class="day-label">T</div>
      <div class="day-label">F</div><div class="day-label">S</div>
      <div class="day-label">S</div>
    </div>
    <div class="grid" id="calendar"></div>
  </div>

  <!-- Streak -->
  <div class="section-title">Streak</div>
  <div class="streak-banner">
    <div class="streak-num" id="streakNum">0</div>
    <div class="streak-info">
      <small>Current streak</small>
      <p id="streakMsg">Keep going!</p>
    </div>
  </div>

  <!-- Stretch Reference -->
  <div class="section-title">Stretches <span>REFERENCE</span></div>
  <div class="stretch-section">
    <div class="stretch-tabs">
      <button class="stretch-tab active" onclick="showStretchTab('warmup', this)">Warm-Up</button>
      <button class="stretch-tab" onclick="showStretchTab('cooldown', this)">Cool-Down</button>
    </div>
    <div class="stretch-list" id="stretchList"></div>
  </div>

  <!-- Progress -->
  <div class="section-title">Progress</div>
  <div class="progress-card">
    <div class="input-row">
      <input type="number" id="waist" placeholder="Waist measurement (cm)">
      <button class="btn-save" onclick="saveProgress()">SAVE</button>
    </div>
    <canvas id="chart"></canvas>
  </div>

</main>

<script>
let periodMode = false;
let interval;

// ─────────────────────────────
// 🧠 AUTO PROGRESSION
// ─────────────────────────────
function getWeek() {
  let start = localStorage.getItem("start");
  if (!start) {
    start = new Date();
    localStorage.setItem("start", start);
  }
  let diff = (new Date() - new Date(start)) / (1000*60*60*24);
  return Math.min(4, Math.floor(diff/7)+1);
}

function getSettings() {
  let week = getWeek();
  let work = 40, rounds = 2;

  if (week === 2) work = 45;
  if (week === 3) rounds = 3;
  if (week === 4) { work = 45; rounds = 3; }

  return {work, rounds, week};
}

// ─────────────────────────────
// 🏋️ PROGRAM DATA
// ─────────────────────────────
const PROGRAMS = {
  normal: {
    warmup: warmupExercises,
    workout: [
      { name:"Frog Pumps", hint:"Pause 2s at top, squeeze", dur:40 },
      { name:"Rest", dur:20 },
      { name:"Reverse Lunges", hint:"Lean slightly forward", dur:40 },
      { name:"Rest", dur:20 },
      { name:"Bird Dog", hint:"Hold 2s each rep", dur:40 },
      { name:"Rest", dur:20 },
      { name:"Incline Push-Ups", hint:"Control down slowly", dur:40 },
      { name:"Rest", dur:20 },
      { name:"Dead Bug", hint:"Keep lower back flat", dur:40 }, // replaced
      { name:"Rest", dur:20 },
      { name:"Superman Hold", hint:"Lift and hold", dur:40 }
    ],
    finisher: [
      { name:"Glute Bridge Hold", hint:"Squeeze glutes hard", dur:60 },
      { name:"Dead Bug", hint:"Slow and controlled", dur:60 }
    ],
    cooldown: cooldownExercises
  },

  period: {
    warmup: periodWarmup,
    workout: [
      { name:"Glute Bridge", hint:"Gentle squeeze", dur:30 },
      { name:"Rest", dur:15 },
      { name:"Bird Dog", hint:"Slow and controlled", dur:30 }
    ],
    finisher: [],
    cooldown: periodCooldown
  }
};

const PHASES = ["warmup","workout","finisher","cooldown"];

let state;

// ─────────────────────────────
// ▶️ START
// ─────────────────────────────
function startWorkout() {
  const settings = getSettings();
  const program = JSON.parse(JSON.stringify(PROGRAMS[periodMode ? "period":"normal"]));

  // apply progression
  program.workout.forEach(ex => {
    if (ex.name !== "Rest") ex.dur = settings.work;
  });

  document.getElementById("phaseBadge").innerText = "● Week " + settings.week;

  state = {
    program,
    phaseIndex: 0,
    exerciseIndex: 0,
    rounds: settings.rounds,
    currentRound: 1,
    running: true
  };

  run();
}

// ─────────────────────────────
// 🔁 RUN LOOP
// ─────────────────────────────
function run() {
  if (!state.running) return;

  const phase = PHASES[state.phaseIndex];
  const list = state.program[phase];

  if (!list || list.length === 0) {
    state.phaseIndex++;
    run();
    return;
  }

  const ex = list[state.exerciseIndex];

  updateUI(ex, phase);

  let time = ex.dur;

  clearInterval(interval);
  interval = setInterval(() => {
    updateTimer(time, ex.dur);

    if (time === 5) speak("5 seconds");

    if (time-- <= 0) {
      clearInterval(interval);
      next();
      run();
    }
  }, 1000);
}

// ─────────────────────────────
// ➡️ NEXT STEP
// ─────────────────────────────
function next() {
  const phase = PHASES[state.phaseIndex];
  const list = state.program[phase];

  state.exerciseIndex++;

  if (state.exerciseIndex >= list.length) {
    state.exerciseIndex = 0;

    if (phase === "workout" && state.currentRound < state.rounds) {
      state.currentRound++;
      return;
    }

    state.currentRound = 1;
    state.phaseIndex++;

    if (state.phaseIndex >= PHASES.length) {
      finishWorkout();
      return;
    }
  }
}

// ─────────────────────────────
// 🎯 UI UPDATE
// ─────────────────────────────
function updateUI(ex, phase) {
  document.getElementById("exercise").innerText = ex.name;
  document.getElementById("exerciseHint").innerText = ex.hint || "";

  const badge = document.getElementById("phaseBadge");

  badge.className = "phase-badge";

  if (phase === "warmup") {
    badge.classList.add("phase-warmup");
    badge.innerText = "● Warm Up";
  }
  else if (phase === "workout") {
    badge.classList.add("phase-workout");
    badge.innerText = "● Workout";
  }
  else if (phase === "finisher") {
    badge.classList.add("phase-workout");
    badge.innerText = "● Finisher";
  }
  else {
    badge.classList.add("phase-cooldown");
    badge.innerText = "● Cooldown";
  }

  speak(ex.name);
}

// ─────────────────────────────
// ⏱ TIMER RING
// ─────────────────────────────
function updateTimer(time, total) {
  document.getElementById("timer").innerText = time;

  const ring = document.getElementById("ringFg");
  const progress = time / total;
  const offset = 326.7 * (1 - progress);

  ring.style.strokeDashoffset = offset;
}

// ─────────────────────────────
// 🔊 VOICE
// ─────────────────────────────
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

// ─────────────────────────────
// ⏸ CONTROLS
// ─────────────────────────────
function pauseWorkout() {
  state.running = false;
  clearInterval(interval);
}

function resetWorkout() {
  clearInterval(interval);
  document.getElementById("exercise").innerText = "Ready";
  document.getElementById("timer").innerText = "00";
}

// ─────────────────────────────
// 🩸 MODE TOGGLE
// ─────────────────────────────
function toggleMode() {
  periodMode = !periodMode;

  const btn = document.getElementById("modeBtn");
  btn.classList.toggle("period");

  btn.innerText = periodMode ? "Period Mode" : "Normal Mode";
}

// ─────────────────────────────
// ✅ FINISH
// ─────────────────────────────
function finishWorkout() {
  alert("Workout Complete 🔥");

  let today = new Date().toDateString();
  localStorage.setItem(today, "done");

  updateStreak();
}
</script>
</body>
</html>
