<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #080b10;
  --surface:  #0e1520;
  --border:   #1c2a3a;
  --accent:   #00e5a0;
  --accent2:  #ff4f6a;
  --text:     #e8f0fe;
  --muted:    #4a6080;
  --done:     #00e5a0;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'DM Mono', monospace;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0 0 40px;
  overflow-x: hidden;
}

/* ── Noise grain overlay ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
  opacity: .5;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: var(--font-display);
  font-size: 2rem;
  letter-spacing: 3px;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(0,229,160,.35);
}

.mode-pill {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 2px;
  padding: 5px 12px;
  border-radius: 99px;
  border: 1px solid var(--accent);
  color: var(--accent);
  background: rgba(0,229,160,.07);
  cursor: pointer;
  transition: all .2s;
  text-transform: uppercase;
}
.mode-pill:hover { background: rgba(0,229,160,.18); }
.mode-pill.period {
  border-color: var(--accent2);
  color: var(--accent2);
  background: rgba(255,79,106,.07);
}

/* ── Main layout ── */
main {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ── Player card ── */
.player-card {
  margin-top: 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  position: relative;
}

.player-card::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 260px; height: 260px;
  background: radial-gradient(circle, rgba(0,229,160,.08) 0%, transparent 70%);
  pointer-events: none;
}

.player-inner {
  padding: 32px 24px 24px;
  text-align: center;
}

.exercise-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}

#exercise {
  font-family: var(--font-display);
  font-size: 3.2rem;
  letter-spacing: 2px;
  line-height: 1;
  color: var(--text);
  min-height: 3.5rem;
  transition: all .3s ease;
}

/* Ring timer */
.ring-wrap {
  display: flex;
  justify-content: center;
  margin: 28px 0 24px;
}

.ring-wrap svg {
  transform: rotate(-90deg);
}

.ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.ring-fg {
  fill: none;
  stroke: var(--accent);
  stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset .9s linear, stroke .3s;
}

.ring-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  font-family: var(--font-display);
  font-size: 2.4rem;
  letter-spacing: 2px;
  color: var(--accent);
}

.ring-container {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

/* Buttons */
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 24px 24px;
}

.btn {
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-family: var(--font-mono);
  font-size: 0.75rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .18s;
  font-weight: 500;
}

.btn-primary {
  background: var(--accent);
  color: #080b10;
  grid-column: 1 / -1;
}
.btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* ── Section title ── */
.section-title {
  font-family: var(--font-display);
  font-size: 1.3rem;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin: 32px 0 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title span { color: var(--accent); font-size: .9rem; }

/* ── Calendar ── */
.cal-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
}

.day-labels {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-bottom: 6px;
}
.day-label {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  color: var(--muted);
  text-align: center;
}

.grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}

.day {
  aspect-ratio: 1;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  text-align: center;
  border-radius: 8px;
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .18s;
  position: relative;
}
.day:hover { border-color: var(--accent); color: var(--text); }
.day.done {
  background: rgba(0,229,160,.12);
  border-color: var(--accent);
  color: var(--accent);
}
.day.done::after {
  content: '✓';
  position: absolute;
  top: 2px; right: 4px;
  font-size: .5rem;
  color: var(--accent);
}

/* ── Streak banner ── */
.streak-banner {
  background: linear-gradient(135deg, rgba(0,229,160,.08), rgba(0,229,160,.02));
  border: 1px solid rgba(0,229,160,.2);
  border-radius: 14px;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.streak-num {
  font-family: var(--font-display);
  font-size: 3rem;
  color: var(--accent);
  line-height: 1;
}
.streak-info small {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}
.streak-info p {
  font-size: .85rem;
  color: var(--text);
  margin-top: 2px;
}

/* ── Progress ── */
.progress-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 22px;
}

.input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}

input[type=number] {
  flex: 1;
  padding: 11px 14px;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: .85rem;
  outline: none;
  transition: border .18s;
}
input[type=number]:focus { border-color: var(--accent); }
input[type=number]::placeholder { color: var(--muted); }

.btn-save {
  padding: 11px 20px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #080b10;
  font-family: var(--font-mono);
  font-size: .75rem;
  letter-spacing: 1px;
  cursor: pointer;
  white-space: nowrap;
  transition: filter .18s;
}
.btn-save:hover { filter: brightness(1.12); }

canvas#chart {
  width: 100% !important;
  height: 120px !important;
  display: block;
  border-radius: 8px;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.player-card, .cal-wrap, .streak-banner, .progress-card {
  animation: fadeUp .5s ease both;
}
.cal-wrap   { animation-delay: .1s; }
.streak-banner { animation-delay: .15s; }
.progress-card { animation-delay: .2s; }

/* Rest exercise accent */
#exercise.is-rest { color: var(--muted); }

/* ── Phase badge ── */
.phase-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 99px;
  margin-bottom: 10px;
  transition: all .3s;
}
.phase-warmup   { background: rgba(255,180,0,.1);   border: 1px solid rgba(255,180,0,.3);  color: #ffb400; }
.phase-workout  { background: rgba(0,229,160,.1);   border: 1px solid rgba(0,229,160,.3);  color: var(--accent); }
.phase-cooldown { background: rgba(120,160,255,.1); border: 1px solid rgba(120,160,255,.3); color: #78a0ff; }

/* ── Phase progress dots ── */
.phase-track {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
}
.phase-dot {
  width: 28px; height: 4px;
  border-radius: 2px;
  background: var(--border);
  transition: background .4s;
}
.phase-dot.active  { background: var(--accent); }
.phase-dot.done    { background: rgba(0,229,160,.35); }
.phase-dot.warmup-dot.active  { background: #ffb400; }
.phase-dot.warmup-dot.done    { background: rgba(255,180,0,.35); }
.phase-dot.cooldown-dot.active { background: #78a0ff; }
.phase-dot.cooldown-dot.done   { background: rgba(120,160,255,.35); }

/* ── Exercise hint ── */
.exercise-hint {
  font-family: var(--font-body);
  font-size: 0.78rem;
  color: var(--muted);
  min-height: 1.1em;
  margin-top: 8px;
  transition: opacity .3s;
  font-weight: 300;
}

/* ring colour transitions */
.ring-fg.warmup   { stroke: #ffb400 !important; }
.ring-fg.cooldown { stroke: #78a0ff !important; }

/* ── Stretch reference cards ── */
.stretch-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.stretch-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.stretch-tab {
  flex: 1;
  padding: 12px 8px;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-align: center;
  color: var(--muted);
  cursor: pointer;
  border: none;
  background: transparent;
  transition: all .18s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.stretch-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.stretch-tab:hover:not(.active) { color: var(--text); }

.stretch-list { padding: 16px; }
.stretch-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.stretch-item:last-child { border-bottom: none; }
.stretch-icon {
  width: 36px; height: 36px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.stretch-icon.wu { background: rgba(255,180,0,.1); }
.stretch-icon.cd { background: rgba(120,160,255,.1); }
.stretch-info { flex: 1; }
.stretch-name {
  font-family: var(--font-display);
  font-size: 1rem;
  letter-spacing: 1px;
  color: var(--text);
  margin-bottom: 2px;
}
.stretch-desc {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.4;
}
.stretch-dur {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}
/* ── Auto Progression ── */
.prog-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.prog-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.prog-level {
  display: flex;
  align-items: center;
  gap: 10px;
}
.prog-level-num {
  font-family: var(--font-display);
  font-size: 2rem;
  color: var(--accent);
  line-height: 1;
}
.prog-level-info small {
  font-family: var(--font-mono);
  font-size: 0.58rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}
.prog-level-info p { font-size:.8rem; color:var(--text); margin-top:1px; }
.prog-next-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 1px;
  padding: 5px 10px;
  border-radius: 8px;
  background: rgba(0,229,160,.08);
  border: 1px solid rgba(0,229,160,.2);
  color: var(--accent);
  text-align: right;
}
.prog-xp-bar-wrap { padding: 0 20px 14px; }
.prog-xp-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--muted);
  margin-top: 12px;
  margin-bottom: 5px;
  letter-spacing: 1px;
}
.prog-xp-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.prog-xp-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #00b8ff);
  border-radius: 3px;
  transition: width .6s ease;
}
.prog-exercises { padding: 0 20px 16px; display:flex; flex-direction:column; gap:8px; }
.prog-ex-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 12px;
  background: rgba(255,255,255,.02);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.prog-ex-name { font-size:.82rem; color:var(--text); }
.prog-ex-right { display:flex; align-items:center; gap:8px; }
.prog-ex-dur  { font-family:var(--font-mono); font-size:.72rem; color:var(--accent); }
.prog-ex-arrow{ font-family:var(--font-mono); font-size:.65rem; color:var(--muted); }
.prog-ex-next { font-family:var(--font-mono); font-size:.72rem; color:#00b8ff; opacity:.7; }
.prog-reset-btn {
  margin: 0 20px 16px;
  width: calc(100% - 40px);
  padding: 9px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.6rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .18s;
}
.prog-reset-btn:hover { border-color:var(--accent2); color:var(--accent2); }
</style>
</head>

<body>

<header>
  <div class="logo">FORGED</div>
  <button class="mode-pill" id="modeBtn" onclick="toggleMode()">Normal Mode</button>
</header>

<main>

  <!-- Player -->
  <div class="player-card">
    <div class="player-inner">
      <!-- Phase dots -->
      <div class="phase-track">
        <div class="phase-dot warmup-dot"   id="dot0"></div>
        <div class="phase-dot"              id="dot1"></div>
        <div class="phase-dot cooldown-dot" id="dot2"></div>
      </div>

      <div id="phaseBadge" class="phase-badge phase-workout">● Workout</div>
      <div class="exercise-label">Current Exercise</div>
      <div id="exercise">Ready</div>
      <div class="exercise-hint" id="exerciseHint"></div>

      <div class="ring-wrap">
        <div class="ring-container">
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fg" id="ringFg" cx="60" cy="60" r="52"
              stroke-dasharray="326.7"
              stroke-dashoffset="0"/>
          </svg>
          <div class="ring-center" id="timer">00</div>
        </div>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="startWorkout()">START WORKOUT</button>
      <button class="btn btn-secondary" onclick="pauseWorkout()">PAUSE</button>
      <button class="btn btn-secondary" onclick="resetWorkout()">RESET</button>
    </div>
  </div>

  <!-- Calendar -->
  <div class="section-title">4-Week Plan <span>28 DAYS</span></div>
  <div class="cal-wrap">
    <div class="day-labels">
      <div class="day-label">M</div><div class="day-label">T</div>
      <div class="day-label">W</div><div class="day-label">T</div>
      <div class="day-label">F</div><div class="day-label">S</div>
      <div class="day-label">S</div>
    </div>
    <div class="grid" id="calendar"></div>
  </div>

  <!-- Streak -->
  <div class="section-title">Streak</div>
  <div class="streak-banner">
    <div class="streak-num" id="streakNum">0</div>
    <div class="streak-info">
      <small>Current streak</small>
      <p id="streakMsg">Keep going!</p>
    </div>
  </div>

  <!-- Auto Progression -->
  <div class="section-title">Progression <span>AUTO</span></div>
  <div class="prog-card">
    <div class="prog-header">
      <div class="prog-level">
        <div class="prog-level-num" id="progLevelNum">1</div>
        <div class="prog-level-info">
          <small>Level</small>
          <p id="progLevelLabel">Foundation</p>
        </div>
      </div>
      <div class="prog-next-badge" id="progNextBadge">Next level in<br><strong id="progWorkoutsLeft">3</strong> workouts</div>
    </div>
    <div class="prog-xp-bar-wrap">
      <div class="prog-xp-label">
        <span>PROGRESS</span>
        <span id="progXpText">0 / 3 workouts</span>
      </div>
      <div class="prog-xp-track"><div class="prog-xp-fill" id="progXpFill" style="width:0%"></div></div>
    </div>
    <div class="prog-exercises" id="progExList"></div>
    <button class="prog-reset-btn" onclick="resetProgression()">Reset Progression</button>
  </div>

  <!-- Stretch Reference -->
  <div class="section-title">Stretches <span>REFERENCE</span></div>
  <div class="stretch-section">
    <div class="stretch-tabs">
      <button class="stretch-tab active" onclick="showStretchTab('warmup', this)">Warm-Up</button>
      <button class="stretch-tab" onclick="showStretchTab('cooldown', this)">Cool-Down</button>
    </div>
    <div class="stretch-list" id="stretchList"></div>
  </div>

  <!-- Progress -->
  <div class="section-title">Progress</div>
  <div class="progress-card">
    <div class="input-row">
      <input type="number" id="waist" placeholder="Waist measurement (cm)">
      <button class="btn-save" onclick="saveProgress()">SAVE</button>
    </div>
    <canvas id="chart"></canvas>
  </div>

</main>

<script>
let periodMode = false;
const CIRCUMFERENCE = 2 * Math.PI * 52;

// ── Exercise data with hints ──
const warmupExercises = [
  { name: "Neck Rolls",         hint: "Slow circles, 5 each side",       dur: 30, type: "stretch" },
  { name: "Rest",               hint: "",                                  dur: 10, type: "rest"    },
  { name: "Shoulder Circles",   hint: "Big circles, forward & back",      dur: 30, type: "stretch" },
  { name: "Rest",               hint: "",                                  dur: 10, type: "rest"    },
  { name: "Hip Circles",        hint: "Hands on hips, wide circles",      dur: 30, type: "stretch" },
  { name: "Rest",               hint: "",                                  dur: 10, type: "rest"    },
  { name: "Leg Swings",         hint: "Hold wall, swing each leg 10x",    dur: 30, type: "stretch" },
  { name: "Rest",               hint: "",                                  dur: 10, type: "rest"    },
  { name: "Arm Cross Stretch",  hint: "Pull each arm across chest",       dur: 30, type: "stretch" },
];

const mainExercises = [
  { name: "Frog Pumps",         hint: "Soles together, thrust hips up",   dur: 40, type: "exercise" },
  { name: "Rest",               hint: "",                                  dur: 20, type: "rest"     },
  { name: "Reverse Lunges",     hint: "Step back, knee hovers floor",     dur: 40, type: "exercise" },
  { name: "Rest",               hint: "",                                  dur: 20, type: "rest"     },
  { name: "Bird Dog",           hint: "Opposite arm & leg, hold 2s",      dur: 40, type: "exercise" },
  { name: "Rest",               hint: "",                                  dur: 20, type: "rest"     },
  { name: "Incline Push-Ups",   hint: "Hands elevated, chest to surface", dur: 40, type: "exercise" },
  { name: "Rest",               hint: "",                                  dur: 20, type: "rest"     },

let phases;
let phaseIndex = 0, exerciseIndex = 0, time = 40, totalTime = 40, interval, paused = false;
let currentPhase = "workout";

function speak(text){
  try { speechSynthesis.cancel(); speechSynthesis.speak(new SpeechSynthesisUtterance(text)); } catch(e){}
}

function toggleMode(){
  periodMode = !periodMode;
  phases = buildPhases(); // rebuild so next Start uses correct exercises
  const btn = document.getElementById("modeBtn");
  btn.textContent = periodMode ? "Period Mode" : "Normal Mode";
  btn.classList.toggle("period", periodMode);
}

function startWorkout(){
  clearInterval(interval);
  paused = false;
  phases = buildPhases();
  phaseIndex = 0;
  exerciseIndex = 0;
  run();
}

function pauseWorkout(){
  if(paused){ paused = false; run(); }
  else { paused = true; clearInterval(interval); }
}

function resetWorkout(){
  clearInterval(interval);
  phaseIndex = 0; exerciseIndex = 0; time = 40; paused = false;
  setExerciseDisplay("Ready", "");
  setTimer(40, 40);
  updatePhaseUI(1, -1); // show workout phase as default
}

function run(){
  const phase = phases[phaseIndex];
  if(exerciseIndex >= phase.exercises.length){
    // Announce phase done
    if(phaseIndex < phases.length - 1){
      speak(phase.label + " complete. Get ready.");
      updatePhaseUI(phaseIndex + 1, -1);
      setTimeout(()=>{
        phaseIndex++;
        exerciseIndex = 0;
        run();
      }, 2500);
      return;
    } else {
      speak("Workout complete. Great job!");
      setExerciseDisplay("All Done!", "You crushed it 🎉");
      setTimer(0, 1);
      markDone();
      updatePhaseUI(2, phaseIndex);
      return;
    }
  }

  const ex = phases[phaseIndex].exercises[exerciseIndex];
  currentPhase = phases[phaseIndex].id;
  totalTime = time = ex.dur;

  updatePhaseUI(phaseIndex, phaseIndex);
  setExerciseDisplay(ex.name, ex.hint);
  speak(ex.name);

  clearInterval(interval);
  interval = setInterval(()=>{
    setTimer(time, totalTime);
    if(time-- <= 0){
      clearInterval(interval);
      exerciseIndex++;
      run();
    }
  }, 1000);
}

function updatePhaseUI(active, done){
  const badge = document.getElementById("phaseBadge");
  const phaseClasses = ["warmup","workout","cooldown"];
  const phaseLabels  = ["● Warm-Up","● Workout","● Cool-Down"];
  const badgeClasses = ["phase-warmup","phase-workout","phase-cooldown"];

  badge.className = "phase-badge " + badgeClasses[active];
  badge.textContent = phaseLabels[active];

  for(let i = 0; i < 3; i++){
    const dot = document.getElementById("dot" + i);
    dot.classList.remove("active","done");
    if(i < active) dot.classList.add("done");
    if(i === active) dot.classList.add("active");
  }
}

function setExerciseDisplay(text, hint){
  const el = document.getElementById("exercise");
  const hintEl = document.getElementById("exerciseHint");
  el.style.opacity = 0;
  el.style.transform = "translateY(8px)";
  hintEl.style.opacity = 0;
  setTimeout(()=>{
    el.textContent = text;
    hintEl.textContent = hint || "";
    const isRest = text === "Rest";
    el.className = isRest ? "is-rest" : "";

    // Ring colour by phase
    const ring = document.getElementById("ringFg");
    ring.classList.remove("warmup","cooldown");
    if(currentPhase === "warmup")   ring.classList.add("warmup");
    if(currentPhase === "cooldown") ring.classList.add("cooldown");

    el.style.transition = "all .25s ease";
    hintEl.style.transition = "opacity .25s ease";
    el.style.opacity = 1;
    el.style.transform = "translateY(0)";
    hintEl.style.opacity = 1;
  }, 150);
}

function setTimer(val, total){
  document.getElementById("timer").textContent = String(val).padStart(2,'0');
  const ring = document.getElementById("ringFg");
  const pct = total > 0 ? val / total : 0;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);

  // override stroke for rest regardless of phase
  const phase = phases && phases[phaseIndex];
  const ex = phase && phase.exercises[exerciseIndex];
  if(ex && ex.type === "rest") ring.style.stroke = "#4a6080";
}

function markDone(){
  localStorage.setItem(new Date().toDateString(), "done");
  // Increment progression
  const prog = getProgression();
  prog.workouts = (prog.workouts || 0) + 1;
  saveProgression(prog);
  renderProgressionUI();
  updateCalendar();
  updateStreak();
}

function createCalendar(){
  const cal = document.getElementById("calendar");
  for(let i = 1; i <= 28; i++){
    const d = document.createElement("div");
    d.className = "day";
    d.textContent = i;
    d.onclick = startWorkout;
    cal.appendChild(d);
  }
}

function updateCalendar(){
  document.querySelectorAll(".day").forEach((d, i) => {
    const date = new Date();
    date.setDate(i + 1);
    d.classList.toggle("done", !!localStorage.getItem(date.toDateString()));
  });
}

function updateStreak(){
  let streak = 0;
  for(let i = 0; i < 30; i++){
    const d = new Date();
    d.setDate(d.getDate() - i);
    if(localStorage.getItem(d.toDateString())) streak++;
    else break;
  }
  document.getElementById("streakNum").textContent = streak;
  const msgs = ["Start today!", "Keep it up!", "You're on fire!", "Unstoppable!", "Legendary!"];
  document.getElementById("streakMsg").textContent = msgs[Math.min(streak, msgs.length-1)];
}

function saveProgress(){
  const waist = parseFloat(document.getElementById("waist").value);
  if(isNaN(waist)) return;
  const data = JSON.parse(localStorage.getItem("waistLog") || "[]");
  data.push(waist);
  localStorage.setItem("waistLog", JSON.stringify(data));
  document.getElementById("waist").value = "";
  drawChart(data);
}

function drawChart(data){
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth - 44;
  const H = 120;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  if(data.length < 2){
    ctx.font = "500 12px 'DM Mono'";
    ctx.fillStyle = "#4a6080";
    ctx.textAlign = "center";
    ctx.fillText("Log measurements to see progress", W/2, H/2);
    return;
  }

  const pad = 12;
  const min = Math.min(...data) - 2;
  const max = Math.max(...data) + 2;
  const range = max - min || 1;
  const xStep = (W - pad*2) / (data.length - 1);

  const toX = i => pad + i * xStep;
  const toY = v => H - pad - ((v - min) / range) * (H - pad*2);

  ctx.strokeStyle = "rgba(255,255,255,.05)";
  ctx.lineWidth = 1;
  for(let g = 0; g <= 4; g++){
    const y = pad + (g / 4) * (H - pad*2);
    ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - pad, y); ctx.stroke();
  }

  const grad = ctx.createLinearGradient(0, pad, 0, H);
  grad.addColorStop(0, "rgba(0,229,160,.25)");
  grad.addColorStop(1, "rgba(0,229,160,0)");

  ctx.beginPath();
  data.forEach((v, i) => { i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)); });
  ctx.lineTo(toX(data.length-1), H);
  ctx.lineTo(toX(0), H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  ctx.beginPath();
  data.forEach((v, i) => { i === 0 ? ctx.moveTo(toX(i), toY(v)) : ctx.lineTo(toX(i), toY(v)); });
  ctx.strokeStyle = "#00e5a0";
  ctx.lineWidth = 2;
  ctx.lineJoin = "round";
  ctx.stroke();

  data.forEach((v, i) => {
    ctx.beginPath();
    ctx.arc(toX(i), toY(v), 4, 0, Math.PI*2);
    ctx.fillStyle = "#080b10";
    ctx.fill();
    ctx.strokeStyle = "#00e5a0";
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

// ── Progression system ──
const WORKOUTS_PER_LEVEL = 3;
const DUR_INCREMENT = 5;
const MAX_DUR = 90;
const LEVEL_NAMES = ["Foundation","Builder","Grinder","Warrior","Champion","Elite","Legend"];

const BASE_DURATIONS = {
  "Frog Pumps":40, "Reverse Lunges":40, "Bird Dog":40,
  "Incline Push-Ups":40, "Superman Hold":40, "Glute Bridge":40
};

function getProgression(){ return JSON.parse(localStorage.getItem("progression") || '{"workouts":0}'); }
function saveProgression(p){ localStorage.setItem("progression", JSON.stringify(p)); }
function currentLevel(w){ return Math.floor(w / WORKOUTS_PER_LEVEL); }

function durForExercise(name, workouts){
  const base = BASE_DURATIONS[name];
  if(!base) return null;
  return Math.min(base + currentLevel(workouts) * DUR_INCREMENT, MAX_DUR);
}

function applyProgression(exercises){
  const { workouts } = getProgression();
  return exercises.map(ex => {
    const d = durForExercise(ex.name, workouts);
    return d ? { ...ex, dur: d } : ex;
  });
}

function renderProgressionUI(){
  const prog = getProgression();
  const lvl  = currentLevel(prog.workouts);
  const done = prog.workouts % WORKOUTS_PER_LEVEL;
  const pct  = (done / WORKOUTS_PER_LEVEL) * 100;

  document.getElementById("progLevelNum").textContent   = lvl + 1;
  document.getElementById("progLevelLabel").textContent = LEVEL_NAMES[Math.min(lvl, LEVEL_NAMES.length-1)];
  document.getElementById("progXpText").textContent     = `${done} / ${WORKOUTS_PER_LEVEL} workouts`;
  document.getElementById("progXpFill").style.width     = pct + "%";
  document.getElementById("progWorkoutsLeft").textContent = WORKOUTS_PER_LEVEL - done;

  const list = document.getElementById("progExList");
  list.innerHTML = Object.keys(BASE_DURATIONS).map(name => {
    const cur  = durForExercise(name, prog.workouts);
    const next = Math.min(cur + DUR_INCREMENT, MAX_DUR);
    const atMax = cur >= MAX_DUR;
    return `<div class="prog-ex-row">
      <span class="prog-ex-name">${name}</span>
      <span class="prog-ex-right">
        <span class="prog-ex-dur">${cur}s</span>
        ${atMax
          ? `<span class="prog-ex-arrow">— MAX</span>`
          : `<span class="prog-ex-arrow">→</span><span class="prog-ex-next">${next}s</span>`}
      </span>
    </div>`;
  }).join("");
}

function resetProgression(){
  if(!confirm("Reset all progression back to level 1?")) return;
  saveProgression({ workouts: 0 });
  renderProgressionUI();
}

function buildPhases(){
  if(periodMode){
    return [
      { id:"warmup",   label:"Warm-Up",   exercises: periodWarmup   },
      { id:"workout",  label:"Workout",   exercises: applyProgression(periodMain) },
      { id:"cooldown", label:"Cool-Down", exercises: periodCooldown },
    ];
  }
  return [
    { id:"warmup",   label:"Warm-Up",   exercises: warmupExercises   },
    { id:"workout",  label:"Workout",   exercises: applyProgression(mainExercises) },
    { id:"cooldown", label:"Cool-Down", exercises: cooldownExercises },
  ];
}

}
